name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on v1.0.0, v1.2.3-beta, etc.

  workflow_dispatch:   # allow manual runs for testing (no release created)

permissions:
  contents: write      # needed to create GitHub Releases

env:
  # Universal2 Python from python.org — contains both arm64 and x86_64
  PYTHON_PKG_URL: "https://www.python.org/ftp/python/3.13.2/python-3.13.2-macos11.pkg"
  PYTHON_BIN: "/usr/local/bin/python3.13"

jobs:
  test:
    name: Run tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        run: python -m pytest --tb=short -q

  build-arm64:
    name: Build (arm64)
    needs: test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          echo "Stamping version: $VER"
          # Update pyproject.toml (used by build.py for Info.plist)
          sed -i '' "s/^version = .*/version = \"$VER\"/" pyproject.toml
          # Update __init__.py fallback (shown in the app UI)
          sed -i '' "s/__version__ = \".*\"/__version__ = \"$VER\"/" src/quantacrypt/__init__.py
          grep 'version' pyproject.toml | head -1
          grep '__version__' src/quantacrypt/__init__.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Build .app and .dmg
        run: python scripts/build.py --arch arm64 --skip-tests

      - name: Verify built binary is arm64
        run: |
          file dist/quantacrypt.app/Contents/MacOS/quantacrypt
          file dist/quantacrypt.app/Contents/MacOS/quantacrypt | grep -q "arm64" || { echo "ERROR: binary is not arm64!"; exit 1; }
          echo "✓ Binary verified as arm64"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: quantacrypt-arm64
          path: dist/quantacrypt-arm64.dmg
          if-no-files-found: error

  build-x86_64:
    name: Build (x86_64 via Rosetta)
    needs: test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          echo "Stamping version: $VER"
          sed -i '' "s/^version = .*/version = \"$VER\"/" pyproject.toml
          sed -i '' "s/__version__ = \".*\"/__version__ = \"$VER\"/" src/quantacrypt/__init__.py

      - name: Install Rosetta 2
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Install universal2 Python from python.org
        run: |
          curl -L "$PYTHON_PKG_URL" -o /tmp/python.pkg
          sudo installer -pkg /tmp/python.pkg -target /
          # Verify this Python runs as x86_64 under Rosetta
          arch -x86_64 $PYTHON_BIN -c "import platform; assert platform.machine() == 'x86_64', f'Expected x86_64, got {platform.machine()}'"
          echo "✓ Python running as x86_64 under Rosetta"

      - name: Create x86_64 virtual environment
        run: |
          arch -x86_64 $PYTHON_BIN -m venv venv-x86
          # Verify the venv Python is actually x86_64
          arch -x86_64 venv-x86/bin/python -c "import struct; assert struct.calcsize('P') * 8 == 64; import platform; print(f'venv arch: {platform.machine()}')"

      - name: Install dependencies (x86_64)
        run: |
          arch -x86_64 venv-x86/bin/python -m pip install --upgrade pip
          arch -x86_64 venv-x86/bin/python -m pip install ".[dev]"
        env:
          ARCHFLAGS: "-arch x86_64"
          _PYTHON_HOST_PLATFORM: "macosx-11.0-x86_64"

      - name: Verify C extensions are x86_64
        run: |
          # Confirm critical native extensions are the right architecture
          arch -x86_64 venv-x86/bin/python -c "
          import platform
          assert platform.machine() == 'x86_64', f'Wrong arch: {platform.machine()}'
          # Import all native C extensions to confirm they load under x86_64
          from cryptography.hazmat.bindings._rust import _openssl
          import argon2
          print('✓ All native extensions loaded as x86_64')
          "

      - name: Build .app and .dmg (x86_64)
        run: arch -x86_64 venv-x86/bin/python scripts/build.py --arch x86_64 --skip-tests
        env:
          ARCHFLAGS: "-arch x86_64"
          _PYTHON_HOST_PLATFORM: "macosx-11.0-x86_64"

      - name: Verify built binary is x86_64
        run: |
          file dist/quantacrypt.app/Contents/MacOS/quantacrypt
          file dist/quantacrypt.app/Contents/MacOS/quantacrypt | grep -q "x86_64" || { echo "ERROR: binary is not x86_64!"; exit 1; }
          echo "✓ Binary verified as x86_64"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: quantacrypt-x86_64
          path: dist/quantacrypt-x86_64.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-arm64, build-x86_64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            artifacts/quantacrypt-arm64/quantacrypt-arm64.dmg \
            artifacts/quantacrypt-x86_64/quantacrypt-x86_64.dmg \
            --title "QuantaCrypt ${{ steps.version.outputs.tag }}" \
            --generate-notes

  bump-version:
    name: Commit released version back to repo
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version files
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          echo "Bumping repo version to $VER"
          sed -i "s/^version = .*/version = \"$VER\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"$VER\"/" src/quantacrypt/__init__.py
          echo "pyproject.toml: $(grep '^version' pyproject.toml)"
          echo "__init__.py:    $(grep '__version__' src/quantacrypt/__init__.py)"

      - name: Commit and push
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/quantacrypt/__init__.py
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "chore: bump version to $VER [skip ci]"
          git push origin master
