name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on v1.0.0, v1.2.3-beta, etc.

  workflow_dispatch:   # allow manual runs for testing (no release created)

permissions:
  contents: write      # needed to create GitHub Releases

env:
  # Universal2 Python from python.org — contains both arm64 and x86_64
  PYTHON_PKG_URL: "https://www.python.org/ftp/python/3.13.2/python-3.13.2-macos11.pkg"
  PYTHON_BIN: "/usr/local/bin/python3.13"

jobs:
  test:
    name: Run tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        run: python -m pytest --tb=short -q

  build-arm64:
    name: Build (arm64)
    needs: test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Build .app and .dmg
        run: python scripts/build.py --arch arm64 --skip-tests

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantacrypt-arm64
          path: dist/quantacrypt-arm64.dmg
          if-no-files-found: error

  build-x86_64:
    name: Build (x86_64 via Rosetta)
    needs: test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Install universal2 Python from python.org
        run: |
          curl -L "$PYTHON_PKG_URL" -o /tmp/python.pkg
          sudo installer -pkg /tmp/python.pkg -target /
          # Verify this Python runs as x86_64 under Rosetta
          arch -x86_64 $PYTHON_BIN -c "import platform; assert platform.machine() == 'x86_64', f'Expected x86_64, got {platform.machine()}'"
          echo "✓ Python running as x86_64 under Rosetta"

      - name: Install dependencies (x86_64)
        run: arch -x86_64 $PYTHON_BIN -m pip install ".[dev]"

      - name: Build .app and .dmg (x86_64)
        run: arch -x86_64 $PYTHON_BIN scripts/build.py --arch x86_64 --skip-tests
        env:
          # Force all child processes (PyInstaller, pip) to use x86_64
          ARCHFLAGS: "-arch x86_64"
          _PYTHON_HOST_PLATFORM: "macosx-11.0-x86_64"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantacrypt-x86_64
          path: dist/quantacrypt-x86_64.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-arm64, build-x86_64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            artifacts/quantacrypt-arm64/quantacrypt-arm64.dmg \
            artifacts/quantacrypt-x86_64/quantacrypt-x86_64.dmg \
            --title "QuantaCrypt ${{ steps.version.outputs.tag }}" \
            --generate-notes
